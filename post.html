<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vehicle Job Post</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 20px;
    }

    .container {
  background: white;
  width: 100%;
  max-width: 500px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  background-color: white;
  box-sizing: border-box;
}


    h2, h3 {
      text-align: center;
    }

    label {
      margin-top: 10px;
      display: block;
      color: #555;
    }

    select, input {
      width: 95%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      
    }

    .form-section {
      display: none;
      margin-top: 20px;
    }

    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #b8d5f5;
      display: block;
      margin: 10px auto;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007BFF;
      color: white;
      border: none;
      margin-top: 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
    .profile-wrapper {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 10px auto;
}

.upload-label {
  position: absolute;
  bottom: 0;
  right: 0;
  background: #b8d5f5;
  color: white;
  border-radius: 50%;
  padding: 6px 8px;
  font-size: 16px;
  cursor: pointer;
  border: 2px solid white;
}

.upload-label:hover {
  background: #0056b3;
}
    .hidden {
      display: none;
    }
    .profile-wrapper img {
  cursor: pointer;
}
@media (max-width: 600px) {
  .container {
    padding: 15px;
    border-radius: 8px;
    box-shadow: none;
    margin: 0 10px;
  }

  .profile-wrapper {
    width: 90px;
    height: 90px;
  }

  .profile-pic {
    width: 90px;
    height: 90px;
  }

  h1, h2 {
    font-size: 20px;
  }

  input, select, button, label {
    font-size: 14px;
  }

  button {
    padding: 10px;
  }
}

  </style>
</head>
<body>

<div class="container">
 

  <!-- Vehicle Selector -->

     <h2>Select Vehicle Type</h2>

  <!-- Hidden File Input -->

  <!-- Icon label (optional) -->

<script>
  function showFormAndHideSelect() {
    const type = document.getElementById("vehicle-type").value;
    const forms = document.querySelectorAll(".form-section");
    forms.forEach(f => f.style.display = "none");

    if (type) {
      document.getElementById(type + "-form").style.display = "block";
      document.getElementById("vehicle-selector").style.display = "none"; // Hide selector
    }
  }

 function previewDocument(event, previewId) {
    const file = event.target.files[0];
    if (file) {
      const img = document.getElementById(previewId);
      img.src = URL.createObjectURL(file);
    }
  }
  function previewImage(event, previewId) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById(previewId).src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
}

</script>
